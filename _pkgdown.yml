url: https://joshuamarie.github.io/statim

template:
  bootstrap: 5
  light-switch: true
  bootswatch: flatly
  bslib:
    base_font: {google: "Viaoda Libre"}
    heading_font: {google: "Viaoda Libre"}
    code_font: {google: "Fira Mono"}
    primary: "#0054AD"
    link-color: "#0054AD"
  math-rendering: katex

home:
  title: "statim • Higher Level Interface for Statistical Inference"
  description: >
    Higher Level Interface and attempting the re-imagination of "grammar of statistical inference" framework in a package, mixing with 'ggplot2' / 'tidyverse' paradigm.

navbar:
  type: light
  structure:
    # left: [intro, reference, articles, tutorials, news]
    left: [intro, reference]
    right: [search, github, lightswitch, blog]
  # components:
  #   intro:
  #     text: Get started
  #     href: articles/tabstats.html
  #   reference:
  #     text: Reference
  #     href: reference/index.html
  #   articles:
  #     text: Articles
  #     menu:
  #       - text: Getting Started
  #         href: articles/tabstats.html
    blog:
      text: Blog
      icon: fa-blog
      href: https://joshuamarie.com
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/joshuamarie/tabstats
      aria-label: GitHub

reference:
  - title: High Level API
    desc: Main functions for interactive uses

  - subtitle: Model definition construction verb
    desc: A verb that describes the model you want to analyze
    contents:
    - model-define-base

  - subtitle: Model IDs
    desc: Basically mappers to shape the model you want to describe. Formula also allowed.
    contents:
    - x_by
    - rel
    - pairwise

  - subtitle: H-test configuration
    desc: Verbs that defines the test you want to execute
    contents:
    - prepare-test
    - via
    - through

  - subtitle: H-test executioner
    desc: Complete contingency table displayer
    contents:
    - conclude


  - title: Grammatical verbs
    desc: Functions that signifies "grammar of statistical inference"

  - subtitle: H-test pipeline
    desc: Functions to express the grammar for H-test pipeline
    contents:
    - define_model
    - prepare_test
    # - write_claim
    - via
    - through
    - update.test_lazy
    - conclude

  - subtitle: Null Hypotheses handlers
    desc: Functions to express the grammar for generating, modifying, and describing null hypothesis models
    contents:
    - define_model
    # - write_claims
    # - generate_null

  - title: Low Level API
    desc: Main functions to interact with 'statim' API

  - subtitle: Model ID helpers
    desc: You can make new mappers with these functions
    contents:
    - model_id_class
    - model-processor

  - subtitle: Inference context interactors
    desc: Functions to interact objects from the pipeline
    contents:
    - infer-context-accessors

  - subtitle: Parameter definers
    desc: Functions to define function for inference's parameters
    contents:
    - fun_args
    - method_spec

  - subtitle: H-test storage
    desc: Acts like a storage room to store the metadata of H-test definitions
    contents:
    - test_define
    - HTEST_FN

  - title: Battery-ready H-test functions
    desc: Functions used for Hypothesis testing
    contents:
    - TTEST


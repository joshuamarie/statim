url: https://joshuamarie.github.io/statim

template:
  bootstrap: 5
  light-switch: true
  bootswatch: flatly
  bslib:
    base_font: {google: "Viaoda Libre"}
    heading_font: {google: "Viaoda Libre"}
    code_font: {google: "Fira Mono"}
    primary: "#0054AD"
    link-color: "#0054AD"
  math-rendering: katex

home:
  title: "statim • Higher Level Interface for Statistical Inference"
  description: >
    Higher Level Interface and attempting the re-imagination of "grammar of statistical inference" framework in a package, mixing with 'ggplot2' / 'tidyverse' paradigm.

navbar:
  type: light
  structure:
    left: [intro, reference]
    right: [search, github, lightswitch, blog]
  components:
    blog:
      text: Blog
      icon: fa-blog
      href: https://joshuamarie.com
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/joshuamarie/statim
      aria-label: GitHub

reference:
  - title: High Level API
    desc: Main functions for interactive use

  - subtitle: Model definition
    desc: Verbs that describe the model you want to analyze
    contents:
    - model-define-base

  - subtitle: Model IDs
    desc: Mappers to shape the model you want to describe. Formula also allowed.
    contents:
    - x_by
    - rel
    - pairwise

  - subtitle: Multiple Inline Codes
    desc: Analogue to `I()`, but only captures the expression and accepts multiple inline codes.
    contents:
    - inlines

  - subtitle: H-test pipeline
    desc: Verbs that build and execute the test pipeline
    contents:
    - prepare_test
    - via
    - update.test_lazy
    - conclude

  - subtitle: H-test executioner
    desc: Eager execution of a prepared test
    contents:
    - TTEST
    - CORTEST

  # - title: Low Level API
  #   desc: Functions to interact with the statim internals

  - title: Low-level/Implementation API
    desc: Functions for building and extending test implementations

  - subtitle: Model ID helpers
    desc: Build new model ID mappers
    contents:
    - model_id_class
    - model-processor
    - model_id_info

  - subtitle: Implementation containers
    desc: Declare how a test runs
    contents:
    - agendas
    - baseline
    - variant

  - subtitle: Test definition
    desc: Register a new test implementation
    contents:
    - test_define
    - HTEST_FN

  - subtitle: Session-scoped variant management
    desc: Add or replace variants on existing test functions
    contents:
    - htest-defs-modifiers

footer:
  structure:
    left: developed_by
    right: built_with
  components:
    built_with: >
      Built with <a href="https://pkgdown.r-lib.org/">pkgdown</a>.
      Visit my <a href="https://joshuamarie.com">blog</a> for more content.

development:
  mode: auto
  version_label: default
  version_tooltip: "Version"
